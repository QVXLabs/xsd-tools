name: build-and-test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # ---------------------------------------------------------------------
  # Linux + macOS, x86_64 and ARM. Deps via Conan (the only reliable source
  # of Lua 5.1 + a matching luac, which the embedded engine requires).
  # ---------------------------------------------------------------------
  unix:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    arch: x86_64, experimental: false }
          - { os: ubuntu-24.04-arm, arch: arm64,  experimental: true  }
          - { os: macos-13,         arch: x86_64, experimental: true  }
          - { os: macos-14,         arch: arm64,  experimental: true  }
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install build tools
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y ninja-build maven
          else
            brew install ninja maven || true
          fi
          pip install 'conan<2'

      - name: Resolve dependencies (Conan)
        run: |
          conan profile new default --detect --force
          # libstdc++11 ABI on Linux gcc
          if [ "$RUNNER_OS" = "Linux" ]; then
            conan profile update settings.compiler.libcxx=libstdc++11 default
          fi
          conan install . -if build --build=missing

      - name: Configure + build + test
        run: |
          source build/activate.sh
          cmake -S . -B build -G "Ninja Multi-Config"
          cmake --build build --config Release -j
          ctest --test-dir build -C Release --output-on-failure

  # ---------------------------------------------------------------------
  # Windows (MSVC), x86_64 and ARM. Exercises the incbin generator-tool
  # embedding path. Experimental until the ARM/MSVC images stabilise.
  # ---------------------------------------------------------------------
  windows:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, arch: x86_64 }
          - { os: windows-11-arm, arch: arm64  }
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install tools
        run: pip install "conan<2"

      - name: Resolve dependencies (Conan)
        run: |
          conan profile new default --detect --force
          conan install . -if build --build=missing

      - name: Configure + build + test
        run: |
          ./build/activate.ps1
          cmake -S . -B build -G "Ninja Multi-Config"
          cmake --build build --config Release
          ctest --test-dir build -C Release --output-on-failure
