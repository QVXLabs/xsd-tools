name: build-and-test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # ---------------------------------------------------------------------
  # Linux + macOS, x86_64 and ARM. Deps resolve via the in-tree fallback:
  # boost/expat/googletest submodules + lua/tinyxml fetched by CMake. The
  # bundled lua build yields the matching 5.1 luac the engine requires.
  # ---------------------------------------------------------------------
  unix:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    arch: x86_64, experimental: false }
          - { os: ubuntu-24.04-arm, arch: arm64,  experimental: true  }
          - { os: macos-15,         arch: arm64,  experimental: true  }
          # Intel macOS: no free hosted runner remains; -large is billed.
          - { os: macos-15-large,   arch: x86_64, experimental: false }
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # Node for the ts-xml round-trips (tsc + fast-xml-parser via npm).
      # lts/* tracks the current LTS so the version never ages into EOL.
      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      # Warm the shared Maven local repo across runs: the Java round-trips
      # all read ~/.m2, so a cold runner would otherwise re-download every
      # dependency. Locally this cache is already warm; it only matters here.
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ runner.os }}-${{ hashFiles('test/**/pom.xml') }}
          restore-keys: m2-${{ runner.os }}-

      - name: Install build tools
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y ninja-build maven
            # The runner image ships a stray Lua dev package; find_package(Lua
            # 5.1 EXACT) matches it and links system liblua, but a mismatched
            # luac then compiles bytecode liblua rejects (LUA_ERRSYNTAX at
            # load). Show what's present, then remove it so the self-contained
            # bundled lua+luac pair is used.
            echo "Lua packages present before removal:"
            dpkg -l | grep -i lua || echo "  (none)"
            sudo apt-get remove -y 'liblua5.*' 'lua5.*' || true
          else
            brew install ninja maven || true
          fi

      - name: Configure + build + test
        run: |
          cmake -S . -B build -G "Ninja Multi-Config" -DCMAKE_DISABLE_FIND_PACKAGE_Lua=ON
          cmake --build build --config Release -j
          # Run the gtest binary directly (project convention: no ctest),
          # sharded across cores for the mvn/cc/python round-trips.
          python3 test/run_parallel.py --binary build/test/Release/xsdb-test

  # ---------------------------------------------------------------------
  # Windows (MSVC), x86_64 and ARM. Exercises the incbin generator-tool
  # embedding path. Experimental until the ARM/MSVC images stabilise.
  # ---------------------------------------------------------------------
  windows:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, arch: x86_64 }
          - { os: windows-11-arm, arch: arm64  }
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # Node for the ts-xml round-trips (tsc + fast-xml-parser via npm).
      # lts/* tracks the current LTS so the version never ages into EOL.
      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ runner.os }}-${{ hashFiles('test/**/pom.xml') }}
          restore-keys: m2-${{ runner.os }}-

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Configure + build + test
        run: |
          # GNU patch (for the lua LNUM patch) ships with Git. Append it to
          # PATH so it doesn't shadow MSVC's link.exe with Git's coreutils.
          $env:PATH += ";$env:ProgramFiles\Git\usr\bin"
          patch --version
          cmake -S . -B build -G "Ninja Multi-Config" -DCMAKE_DISABLE_FIND_PACKAGE_Lua=ON
          cmake --build build --config Release
          # Run the gtest binary directly (project convention: no ctest).
          python3 test/run_parallel.py --binary build/test/Release/xsdb-test
